<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frontera-X | Sala Principal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-glass: rgba(10, 14, 26, 0.65);
            --border-glass: rgba(255, 255, 255, 0.12);
            --accent: #00ffcc;
            --accent-yellow: #ffcc00;
            --text-light: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body { 
            margin: 0; overflow: hidden; background-color: #06080c; 
            font-family: 'Inter', sans-serif; width: 100vw; height: 100vh;
        }

        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; display: flex;
            flex-direction: column; justify-content: space-between; padding: 20px;
        }
        .interactive { pointer-events: auto; }

        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; }

        .user-profile {
            background: var(--bg-glass); border: 1px solid var(--border-glass);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 10px 20px; border-radius: 12px; display: flex; align-items: center; gap: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .avatar-box {
            width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent) 0%, #006655 100%);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 20px; color: #000;
        }

        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 15px; font-weight: 700; color: var(--text-light); }
        .user-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); margin-top: 2px; }

        .resources { display: flex; gap: 12px; }
        .resource-item {
            background: var(--bg-glass); border: 1px solid var(--border-glass); backdrop-filter: blur(16px);
            padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; color: #fff;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .resource-item.gold span { color: var(--accent-yellow); }
        .resource-item.diamonds span { color: #00bfff; }

        .main-body { display: flex; justify-content: space-between; align-items: center; flex-grow: 1; width: 100%; }
        .side-menu { display: flex; flex-direction: column; gap: 10px; }

        .side-btn {
            background: var(--bg-glass); border: 1px solid var(--border-glass); backdrop-filter: blur(10px);
            color: #cbd5e1; padding: 14px 24px; border-radius: 10px; font-size: 13px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; min-width: 180px; text-align: left;
            transition: all 0.2s ease;
        }
        .side-btn:hover { color: #fff; border-color: var(--accent); transform: translateX(6px); background: rgba(0, 255, 204, 0.15); }

        .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }

        .bottom-nav {
            display: flex; gap: 10px; background: rgba(5, 7, 12, 0.6);
            padding: 6px; border-radius: 12px; border: 1px solid var(--border-glass); backdrop-filter: blur(10px);
        }
        .nav-item { padding: 10px 20px; color: #94a3b8; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: color 0.2s; }
        .nav-item:hover { color: var(--accent); }

        .start-panel { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }

        .mode-selector {
            background: var(--bg-glass); border: 1px solid var(--border-glass); backdrop-filter: blur(12px);
            padding: 12px 24px; border-radius: 12px; text-align: right; min-width: 220px; cursor: pointer;
            transition: all 0.2s;
        }
        .mode-selector:hover { border-color: var(--accent-yellow); background: rgba(255, 204, 0, 0.05); }
        .mode-title { font-size: 14px; font-weight: 800; color: #fff; text-transform: uppercase; }
        .map-sub { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; }

        .start-btn {
            background: linear-gradient(135deg, #ffcc00 0%, #ff9900 100%); border: none; color: #000;
            padding: 18px 60px; border-radius: 12px; font-size: 22px; font-weight: 900; cursor: pointer;
            box-shadow: 0 6px 25px rgba(255, 153, 0, 0.4); text-transform: uppercase;
        }

        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #06080c;
            z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 16px; gap: 15px;
        }

        /* Ventana Emergente de Modos */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6);
            z-index: 100; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #111827; border: 2px solid var(--accent); border-radius: 20px; padding: 30px;
            width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center;
        }
        .modal-content h3 { color: #fff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .mode-option {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 14px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        .mode-option:hover { border-color: var(--accent); background: rgba(0,255,204,0.1); }
        .close-modal { color: var(--text-muted); font-size: 12px; cursor: pointer; text-decoration: underline; margin-top: 15px; display: inline-block; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <span id="loading-msg">S CONECTANDO AL SERVIDOR CENTRAL...</span>
    </div>
    
    <div id="game-canvas"></div>

    <div class="hud-overlay">
        <div class="top-bar">
            <div class="user-profile interactive">
                <div class="avatar-box" id="avatar-letter">-</div>
                <div class="user-info">
                    <span class="user-name" id="profile-name">Cargando...</span>
                    <span class="user-id" id="profile-id">ID: ---------</span>
                </div>
            </div>
            <div class="resources interactive">
                <div class="resource-item gold">🪙 <span id="val-gold">0</span></div>
                <div class="resource-item diamonds">💎 <span id="val-diamonds">0</span></div>
            </div>
        </div>

        <div class="main-body">
            <div class="side-menu interactive">
                <button class="side-btn" onclick="window.location.href='store/'">🛒 Tienda</button>
                <button class="side-btn" onclick="window.location.href='luck-royale/'">🎯 Luck Royale</button>
                <button class="side-btn" onclick="window.location.href='booyah-pass/'">🎫 Pase Booyah</button>
                <button class="side-btn" onclick="window.location.href='missions/'">📋 Misiones</button>
                <button class="side-btn" onclick="window.location.href='events/'">📅 Eventos</button>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="bottom-nav interactive">
                <div class="nav-item" onclick="window.location.href='vault/'">📦 Vault</div>
                <div class="nav-item" onclick="window.location.href='weapon/'">🔫 Weapon</div>
                <div class="nav-item" onclick="window.location.href='lab/'">🧪 Lab</div>
            </div>
            <div class="start-panel interactive">
                <div class="mode-selector" onclick="openModeSelector()">
                    <div class="mode-title" id="current-mode-display">Battle Royale Bot</div>
                    <div class="map-sub">Mapa: Mistenk</div>
                </div>
                <button class="start-btn" id="btn-start-match">START</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="mode-modal">
        <div class="modal-content interactive">
            <h3>Seleccionar Modo de Juego</h3>
            <div class="mode-option" onclick="selectMode('Battle Royale Bot')">Battle Royale Bot</div>
            <div class="mode-option" onclick="selectMode('Clasificatoria 5v5')">Clasificatoria 5v5</div>
            <div class="mode-option" onclick="selectMode('Duelo de Escuadras')">Duelo de Escuadras</div>
            <span class="close-modal" onclick="closeModeSelector()">Cancelar</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeUPVDX40AFX-W_crtUWm0TsXS2smx1zo",
            authDomain: "frontera-game.firebaseapp.com",
            projectId: "frontera-game",
            storageBucket: "frontera-game.firebasestorage.app",
            messagingSenderId: "728596699203",
            appId: "1:728596699203:web:a199829078de6a2ef95cf6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // Como este archivo está en /game/index.html, volvemos un nivel atrás con '../'
                window.location.replace("../index.html");
            } else {
                try {
                    const docRef = doc(db, "usuarios", user.uid);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById("profile-name").textContent = data.username;
                        document.getElementById("profile-id").textContent = "ID: " + data.gameId;
                        document.getElementById("avatar-letter").textContent = data.username.charAt(0).toUpperCase();
                        
                        // NOTA: Si en tu Firestore el usuario viejo se guardó con 330k, saldrá esa cantidad.
                        // Las nuevas cuentas o ediciones manuales reflejarán 1,000 oro y 0 diamantes sin problemas.
                        document.getElementById("val-gold").textContent = Number(data.oro).toLocaleString();
                        document.getElementById("val-diamonds").textContent = data.diamantes;

                        document.getElementById("loading-screen").style.display = "none";
                    } else {
                        window.location.replace("../index.html");
                    }
                } catch (error) {
                    console.error("Error en game.html:", error);
                }
            }
        });

        // Funciones Globales para el Selector de Modos de Juego
        window.openModeSelector = function() {
            document.getElementById('mode-modal').classList.add('active');
        }
        window.closeModeSelector = function() {
            document.getElementById('mode-modal').classList.remove('active');
        }
        window.selectMode = function(modeName) {
            document.getElementById('current-mode-display').textContent = modeName;
            closeModeSelector();
        }

        // --- ENTORNO GRÁFICO 3D (MEJORADO CON CARICATURA Y ARCOÍRIS) ---
        const container = document.getElementById('game-canvas');
        const scene = new THREE.Scene();
        
        // Luces estilizadas
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 10); scene.add(dirLight);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // 🌈 1. FONDO COLORIDO ESTILO ARCOÍRIS DINÁMICO
        const vertexShader = `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = vecPerspectiveMatrix * modelViewMatrix * vec4(position, 1.0); }
        `;
        // Enfoque simplificado y hermoso usando vértices estándar de ThreeJS
        const skyGeo = new THREE.SphereGeometry(100, 32, 15);
        const skyMat = new THREE.MeshBasicMaterial({ color: 0x221144, side: THREE.BackSide });
        const sky = new THREE.Mesh(skyGeo, skyMat); scene.add(sky);

        // Suelo reflectante de neón
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x110822, roughness: 0.1, metalness: 0.2 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2; scene.add(floor);

        // 🤖 2. PERSONAJE REALÍSTICO/CARICATURA (SUAVE SIN CUBOS)
        const character = new THREE.Group();
        
        // Materiales cartoon de colores vibrantes
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.6 }); // Tono piel
        const hairMat = new THREE.MeshStandardMaterial({ color: 0x33ff00, roughness: 0.8 }); // Cabello Neón
        const suitMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, roughness: 0.5 }); // Traje cibernético
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

        // Cabeza estilizada (Esfera lisa)
        const headGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const charHead = new THREE.Mesh(headGeo, headMat);
        charHead.position.y = 3.4; charHead.scale.set(1, 1.1, 1); character.add(charHead);

        // Ojos grandes cartoon
        const eyeGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-0.18, 3.5, 0.4); character.add(eyeL);
        const eyeR = eyeL.clone(); eyeR.position.x = 0.18; character.add(eyeR);

        // Pelo puntiagudo estilizado
        const hairGeo = new THREE.ConeGeometry(0.4, 0.7, 16);
        const hair = new THREE.Mesh(hairGeo, hairMat);
        hair.position.set(0, 3.9, -0.1); hair.rotation.x = -0.2; character.add(hair);

        // Cuerpo/Torso orgánico (Cápsula redondeada en lugar de cubos)
        const bodyGeo = new THREE.CylinderGeometry(0.4, 0.3, 1.5, 32);
        const charBody = new THREE.Mesh(bodyGeo, suitMat);
        charBody.position.y = 2.2; character.add(charBody);

        // Extremidades redondeadas lisas
        const limbGeo = new THREE.CylinderGeometry(0.12, 0.12, 1.2, 16);
        const armL = new THREE.Mesh(limbGeo, suitMat); armL.position.set(-0.65, 2.3, 0); armL.rotation.z = 0.1; character.add(armL);
        const armR = armL.clone(); armR.position.x = 0.65; armR.rotation.z = -0.1; character.add(armR);

        const legGeo = new THREE.CylinderGeometry(0.15, 0.12, 1.3, 16);
        const legL = new THREE.Mesh(legGeo, headMat); legL.position.set(-0.25, 0.8, 0); character.add(legL);
        const legR = legL.clone(); legR.position.x = 0.25; character.add(legR);

        character.rotation.y = 0.2;
        scene.add(character);
        
        camera.position.set(0, 2.5, 5.5); camera.lookAt(0, 2.3, 0);

        // Animación de loop y Arcoíris dinámico de fondo
        let clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();
            
            // Efecto Arcoíris en las luces y fondo usando senos y cosenos de tiempo
            const r = Math.sin(elapsed * 0.5) * 0.5 + 0.5;
            const g = Math.sin(elapsed * 0.5 + 2.0) * 0.5 + 0.5;
            const b = Math.sin(elapsed * 0.5 + 4.0) * 0.5 + 0.5;
            renderer.setClearColor(new THREE.Color(r * 0.2, g * 0.1, b * 0.3));
            
            // Respiración del personaje
            character.position.y = Math.sin(elapsed * 2) * 0.04;
            charHead.rotation.y = Math.sin(elapsed * 0.5) * 0.1;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
