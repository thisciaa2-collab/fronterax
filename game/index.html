<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frontera-X | Sala Principal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-glass: rgba(10, 14, 26, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent: #00ffcc;
            --accent-yellow: #ffcc00;
            --text-light: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body { 
            margin: 0; overflow: hidden; background-color: #1a233a; 
            font-family: 'Inter', sans-serif; width: 100vw; height: 100vh;
        }

        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; display: flex;
            flex-direction: column; justify-content: space-between; padding: 20px;
        }
        .interactive { pointer-events: auto; }

        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; }

        .user-profile {
            background: var(--bg-glass); border: 1px solid var(--border-glass);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 10px 20px; border-radius: 12px; display: flex; align-items: center; gap: 14px;
        }

        .avatar-box {
            width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent) 0%, #006655 100%);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 20px; color: #000;
        }

        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 15px; font-weight: 700; color: var(--text-light); }
        .user-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); margin-top: 2px; }

        .resources { display: flex; gap: 12px; }
        .resource-item {
            background: var(--bg-glass); border: 1px solid var(--border-glass); backdrop-filter: blur(12px);
            padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; color: #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .resource-item.gold span { color: var(--accent-yellow); }
        .resource-item.diamonds span { color: #00bfff; }

        .main-body { display: flex; justify-content: space-between; align-items: center; flex-grow: 1; width: 100%; }
        .side-menu { display: flex; flex-direction: column; gap: 10px; }

        .side-btn {
            background: var(--bg-glass); border: 1px solid var(--border-glass); backdrop-filter: blur(10px);
            color: #cbd5e1; padding: 12px 24px; border-radius: 10px; font-size: 12px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; min-width: 160px; text-align: left;
        }
        .side-btn:hover { color: #fff; border-color: var(--accent); transform: translateX(4px); }

        .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }

        .bottom-nav {
            display: flex; gap: 10px; background: rgba(5, 7, 12, 0.4);
            padding: 6px; border-radius: 12px; border: 1px solid var(--border-glass); backdrop-filter: blur(10px);
        }
        .nav-item { padding: 10px 20px; color: #94a3b8; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .nav-item:hover { color: var(--accent); }

        .start-panel { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }

        .mode-selector {
            background: var(--bg-glass); border: 1px solid var(--border-glass); backdrop-filter: blur(12px);
            padding: 12px 24px; border-radius: 12px; text-align: right; min-width: 220px;
        }
        .mode-title { font-size: 14px; font-weight: 800; color: #fff; text-transform: uppercase; }
        .map-sub { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; }

        .start-btn {
            background: linear-gradient(135deg, #ffcc00 0%, #ff9900 100%); border: none; color: #000;
            padding: 18px 60px; border-radius: 12px; font-size: 22px; font-weight: 900; cursor: pointer;
            box-shadow: 0 6px 25px rgba(255, 153, 0, 0.4); text-transform: uppercase;
        }

        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #06080c;
            z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 16px; gap: 15px;
        }
        .manual-fix-btn {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 12px; display: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <span id="loading-msg">VERIFICANDO PERFIL EN FIREBASE...</span>
        <button class="manual-fix-btn" id="btn-fix-loop">Ir al Registro Manualmente</button>
    </div>
    
    <div id="game-canvas"></div>

    <div class="hud-overlay">
        <div class="top-bar">
            <div class="user-profile interactive">
                <div class="avatar-box" id="avatar-letter">-</div>
                <div class="user-info">
                    <span class="user-name" id="profile-name">Cargando...</span>
                    <span class="user-id" id="profile-id">ID: ---------</span>
                </div>
            </div>
            <div class="resources interactive">
                <div class="resource-item gold">🪙 <span id="val-gold">0</span></div>
                <div class="resource-item diamonds">💎 <span id="val-diamonds">0</span></div>
            </div>
        </div>

        <div class="main-body">
            <div class="side-menu interactive">
                <button class="side-btn">🛒 Tienda</button>
                <button class="side-btn">🎯 Luck Royale</button>
                <button class="side-btn">🎫 Pase Booyah</button>
                <button class="side-btn">📋 Misiones</button>
                <button class="side-btn">📅 Eventos</button>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="bottom-nav interactive">
                <div class="nav-item">📦 Vault</div>
                <div class="nav-item">🔫 Weapon</div>
                <div class="nav-item">🧪 Lab</div>
            </div>
            <div class="start-panel interactive">
                <div class="mode-selector">
                    <div class="mode-title">Battle Royale Bot</div>
                    <div class="map-sub">Mapa: Mistenk</div>
                </div>
                <button class="start-btn" id="btn-start-match">START</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeUPVDX40AFX-W_crtUWm0TsXS2smx1zo",
            authDomain: "frontera-game.firebaseapp.com",
            projectId: "frontera-game",
            storageBucket: "frontera-game.firebasestorage.app",
            messagingSenderId: "728596699203",
            appId: "1:728596699203:web:a199829078de6a2ef95cf6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- MANEJO SEGURO ANTIBUCLE ---
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // No está logeado, vuelve a la raíz limpiamente
                window.location.replace("index.html");
            } else {
                try {
                    const docRef = doc(db, "usuarios", user.uid);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById("profile-name").textContent = data.username;
                        document.getElementById("profile-id").textContent = "ID: " + data.gameId;
                        document.getElementById("avatar-letter").textContent = data.username.charAt(0).toUpperCase();
                        document.getElementById("val-gold").textContent = Number(data.oro).toLocaleString();
                        document.getElementById("val-diamonds").textContent = data.diamantes;

                        // Apagar pantalla de carga
                        document.getElementById("loading-screen").style.display = "none";
                    } else {
                        // El usuario está logeado en Google pero no guardó datos en Firestore
                        document.getElementById("loading-msg").textContent = "Perfil no encontrado en Base de Datos. Redirigiendo al registro...";
                        setTimeout(() => {
                            window.location.replace("index.html");
                        }, 1500);
                    }
                } catch (error) {
                    console.error("Error en game.html:", error);
                    document.getElementById("loading-msg").textContent = "Falta de permisos o error de red en Firestore.";
                    // Mostramos botón de escape por si hay problemas de reglas
                    document.getElementById("btn-fix-loop").style.display = "block";
                }
            }
        });

        document.getElementById("btn-fix-loop").addEventListener("click", () => {
            window.location.replace("index.html");
        });

        // --- ENTORNO GRÁFICO 3D ---
        const container = document.getElementById('game-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e2736);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const mainLight = new THREE.DirectionalLight(0x00ffcc, 1.2);
        mainLight.position.set(10, 20, 15); scene.add(mainLight);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x111622, roughness: 0.4 }));
        floor.rotation.x = -Math.PI / 2; scene.add(floor);

        const character = new THREE.Group();
        const matSuit = new THREE.MeshStandardMaterial({ color: 0x1f232e });
        const matArmor = new THREE.MeshStandardMaterial({ color: 0xd32f2f });
        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.0, 0.8), matArmor); torso.position.y = 2.4; character.add(torso);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), matSuit); head.position.y = 3.7; character.add(head);
        character.rotation.y = 0.3; scene.add(character);
        camera.position.set(0, 2.6, 6.5); camera.lookAt(0, 2.4, 0);

        function animate() {
            requestAnimationFrame(animate);
            character.position.y = Math.sin(Date.now() * 0.0015) * 0.03;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
