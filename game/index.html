<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frontera-X | Lobby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700;900&family=JetBrains+Mono:wght=700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #06080c;
            --bg-glass: rgba(10, 14, 26, 0.85);
            --border-glass: rgba(255, 255, 255, 0.12);
            --accent: #00ffcc;
            --accent-purple: #9d4edd;
            --accent-yellow: #ffcc00;
            --text-light: #ffffff;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body { 
            background-color: var(--bg-dark); 
            font-family: 'Inter', sans-serif; 
            color: var(--text-light);
            min-height: 100vh;
            overflow: hidden;
        }

        /* DISEÑO DEL LOBBY Base */
        .lobby-container {
            display: flex; flex-direction: column; height: 100vh;
            justify-content: space-between; padding: 30px; position: relative;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .player-info { background: rgba(255,255,255,0.03); border: 1px solid var(--border-glass); padding: 12px 24px; border-radius: 12px; }
        .player-info h2 { font-size: 18px; font-weight: 900; color: var(--accent); }

        .menu-center {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
        }

        /* BOTONES DEL LOBBY */
        .btn-lobby {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--border-glass); color: #fff; padding: 16px 40px; font-size: 14px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease; min-width: 260px; text-align: center;
        }
        .btn-lobby:hover {
            border-color: var(--accent); color: var(--accent); transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 255, 204, 0.15);
        }
        .btn-preset {
            border-color: var(--accent-purple); color: #e0aaff;
        }
        .btn-preset:hover {
            border-color: var(--accent-purple); color: #efd3ff;
            box-shadow: 0 8px 20px rgba(157, 78, 221, 0.2);
        }

        /* 📌 MODAL DE PRESETS (OCULTO POR DEFECTO) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        .preset-modal {
            background: var(--bg-glass); border: 1px solid var(--border-glass);
            width: 850px; max-width: 95%; border-radius: 20px; display: grid;
            grid-template-columns: 220px 1fr; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Lateral Izquierdo: Lista de Presets */
        .preset-sidebar {
            background: rgba(5, 7, 12, 0.6); border-right: 1px solid var(--border-glass);
            padding: 20px; display: flex; flex-direction: column; gap: 12px;
        }
        .sidebar-title { font-size: 14px; font-weight: 900; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 1px; }
        
        .preset-tab {
            background: rgba(255,255,255,0.02); border: 1px solid transparent;
            color: var(--text-muted); padding: 14px; border-radius: 10px; text-align: left;
            font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .preset-tab:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .preset-tab.active {
            background: rgba(157, 78, 221, 0.15); border-color: var(--accent-purple); color: #fff;
        }

        /* Contenido Derecho: Configurador de Ranuras */
        .preset-content { padding: 30px; display: flex; flex-direction: column; justify-content: space-between; }
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .content-header h3 { font-size: 20px; font-weight: 900; text-transform: uppercase; }
        .close-modal { font-size: 24px; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
        .close-modal:hover { color: #ff4a4a; }

        /* Estructura de Selección de Habilidades */
        .slots-grid { display: flex; flex-direction: column; gap: 20px; }
        .slot-box {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            padding: 16px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px;
        }
        .slot-box.usable-slot { border-left: 4px solid var(--accent); }
        .slot-box.ayudable-slot { border-left: 4px solid var(--accent-purple); }

        .slot-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .slot-box.usable-slot .slot-label { color: var(--accent); }
        .slot-box.ayudable-slot .slot-label { color: var(--accent-purple); }

        select {
            background: #0f1422; border: 1px solid var(--border-glass); color: #fff;
            padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600; outline: none;
            width: 100%; cursor: pointer; transition: border-color 0.2s;
        }
        select:focus { border-color: var(--accent); }

        .ayudables-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

        /* Botón Guardar */
        .btn-save-preset {
            background: linear-gradient(135deg, var(--accent) 0%, #006655 100%);
            border: none; color: #000; padding: 14px; border-radius: 8px;
            font-size: 13px; font-weight: 900; text-transform: uppercase; cursor: pointer;
            width: 100%; margin-top: 25px; transition: opacity 0.2s; letter-spacing: 1px;
        }
        .btn-save-preset:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="lobby-container">
        <!-- Barra Superior -->
        <header class="top-bar">
            <div class="player-info">
                <h2 id="lobby-username">Cargando...</h2>
                <small id="lobby-id">ID: ----</small>
            </div>
        </header>

        <!-- Botonera Central Inferior -->
        <div class="menu-center">
            <button class="btn-lobby" onclick="window.location.href='store.html'">🛒 Ir a Tienda</button>
            <!-- El botón de Preset requerido -->
            <button class="btn-lobby btn-preset" onclick="openPresetModal()">🛠 Gestionar Presets</button>
            <button class="btn-lobby" style="border-color:var(--accent);" onclick="alert('Buscando partida...')">⚔ JUGAR</button>
        </div>
    </div>

    <!-- 📌 CAPA INTERACTIVA DEL MODAL DE PRESETS -->
    <div class="modal-overlay" id="presetModalOverlay">
        <div class="preset-modal">
            
            <!-- Lateral: Pestañas de Preset 1 a 5 -->
            <div class="preset-sidebar">
                <div class="sidebar-title">Configuraciones</div>
                <button class="preset-tab active" onclick="switchPresetTab(1)">Preset 1</button>
                <button class="preset-tab" onclick="switchPresetTab(2)">Preset 2</button>
                <button class="preset-tab" onclick="switchPresetTab(3)">Preset 3</button>
                <button class="preset-tab" onclick="switchPresetTab(4)">Preset 4</button>
                <button class="preset-tab" onclick="switchPresetTab(5)">Preset 5</button>
            </div>

            <!-- Panel de Personalización de Ranuras -->
            <div class="preset-content">
                <div>
                    <div class="content-header">
                        <h3 id="active-preset-title">Configurar Preset 1</h3>
                        <span class="close-modal" onclick="closePresetModal()">&times;</span>
                    </div>

                    <div class="slots-grid">
                        <!-- SLOT USABLE (MÁXIMO 1) -->
                        <div class="slot-box usable-slot">
                            <div class="slot-label">Habilidad Usable (Máx 1)</div>
                            <select id="select-usable">
                                <option value="">Ninguno</option>
                                <!-- Se llena dinámicamente si posee a Tamaki -->
                            </select>
                        </div>

                        <!-- SLOTS AYUDABLES (MÁXIMO 3) -->
                        <div class="slot-box ayudable-slot">
                            <div class="slot-label">Habilidades Ayudables (Máx 3 independientes)</div>
                            <div class="ayudables-row">
                                <select id="select-ayudable-1">
                                    <option value="">Vacío</option>
                                    <!-- Se llena dinámicamente con Tivet / Gallet -->
                                </select>
                                <select id="select-ayudable-2">
                                    <option value="">Vacío</option>
                                </select>
                                <select id="select-ayudable-3">
                                    <option value="">Vacío</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="btn-save-preset" onclick="saveActivePresetToServer()">Guardar Preset Actual</button>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeUPVDX40AFX-W_crtUWm0TsXS2smx1zo",
            authDomain: "frontera-game.firebaseapp.com",
            projectId: "frontera-game",
            storageBucket: "frontera-game.firebasestorage.app",
            messagingSenderId: "728596699203",
            appId: "1:728596699203:web:a199829078de6a2ef95cf6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserDocRef = null;
        let misPersonajes = [];
        let currentPresetIndex = 1; // Controla qué preset (1-5) está viendo

        // Objeto local para almacenar la estructura de los 5 presets
        let todosLosPresets = {
            preset1: { usable: "", ayudables: ["", "", ""] },
            preset2: { usable: "", ayudables: ["", "", ""] },
            preset3: { usable: "", ayudables: ["", "", ""] },
            preset4: { usable: "", ayudables: ["", "", ""] },
            preset5: { usable: "", ayudables: ["", "", ""] }
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace("../index.html");
            } else {
                currentUserDocRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(currentUserDocRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById("lobby-username").textContent = data.username || "Jugador";
                    document.getElementById("lobby-id").textContent = `ID: ${data.gameId || "----"}`;
                    
                    // Extraer qué personajes posee comprados
                    misPersonajes = data.personajes || [];
                    
                    // Si ya tiene presets guardados en Firestore, los cargamos
                    if (data.presets) {
                        todosLosPresets = data.presets;
                    }

                    // Renderizar las opciones de los desplegables según lo que posee comprado
                    poblarSelectoresHabilidades();
                }
            }
        });

        // FILTRADO: Rellenar los selectores únicamente con personajes que el jugador posee
        function poblarSelectoresHabilidades() {
            const selectUsable = document.getElementById("select-usable");
            const selectAyudable1 = document.getElementById("select-ayudable-1");
            const selectAyudable2 = document.getElementById("select-ayudable-2");
            const selectAyudable3 = document.getElementById("select-ayudable-3");

            // Limpiar opciones manteniendo la opción por defecto
            selectUsable.innerHTML = '<option value="">Ninguno</option>';
            const defaultAyudable = '<option value="">Vacío</option>';
            selectAyudable1.innerHTML = defaultAyudable;
            selectAyudable2.innerHTML = defaultAyudable;
            selectAyudable3.innerHTML = defaultAyudable;

            // Si compró a Tamaki (Usable), aparece en la lista usable
            if (misPersonajes.includes("Tamaki")) {
                selectUsable.innerHTML += `<option value="Tamaki">Tamaki</option>`;
            }

            // Si compró a Tivet o Gallet (Ayudables), aparecen en las 3 ranuras ayudables
            if (misPersonajes.includes("Tivet")) {
                const opt = `<option value="Tivet">Tivet</option>`;
                selectAyudable1.innerHTML += opt; selectAyudable2.innerHTML += opt; selectAyudable3.innerHTML += opt;
            }
            if (misPersonajes.includes("Gallet")) {
                const opt = `<option value="Gallet">Gallet</option>`;
                selectAyudable1.innerHTML += opt; selectAyudable2.innerHTML += opt; selectAyudable3.innerHTML += opt;
            }
        }

        // JAVASCRIPT:() OPERACIONES DE INTERFAZ NATAL
        window.openPresetModal = function() {
            document.getElementById("presetModalOverlay").style.display = "flex";
            switchPresetTab(1); // Empezar viendo el Preset 1
        };

        window.closePresetModal = function() {
            document.getElementById("presetModalOverlay").style.display = "none";
        };

        // Cambiar entre pestañas (Preset 1 - Preset 5)
        window.switchPresetTab = function(num) {
            currentPresetIndex = num;
            
            // Actualizar diseño estético de pestañas activas
            const tabs = document.querySelectorAll('.preset-tab');
            tabs.forEach((tab, index) => {
                if (index === (num - 1)) tab.classList.add('active');
                else tab.classList.remove('active');
            });

            document.getElementById("active-preset-title").textContent = `Configurar Preset ${num}`;

            // Cargar los valores previamente guardados de este preset específico en la interfaz
            const pKey = `preset${num}`;
            const configActual = todosLosPresets[pKey];

            document.getElementById("select-usable").value = configActual.usable || "";
            document.getElementById("select-ayudable-1").value = configActual.ayudables[0] || "";
            document.getElementById("select-ayudable-2").value = configActual.ayudables[1] || "";
            document.getElementById("select-ayudable-3").value = configActual.ayudables[2] || "";
        };

        // SALVAGUARDAR EN BASE DE DATOS FIRESTORE
        window.saveActivePresetToServer = async function() {
            if (!currentUserDocRef) return;

            const uVal = document.getElementById("select-usable").value;
            const a1Val = document.getElementById("select-ayudable-1").value;
            const a2Val = document.getElementById("select-ayudable-2").value;
            const a3Val = document.getElementById("select-ayudable-3").value;

            // Guardar configuración en la variable local
            const pKey = `preset${currentPresetIndex}`;
            todosLosPresets[pKey] = {
                usable: uVal,
                ayudables: [a1Val, a2Val, a3Val]
            };

            try {
                // Actualizar el mapa completo de presets en el documento del jugador
                await updateDoc(currentUserDocRef, {
                    presets: todosLosPresets
                });
                alert(`¡Preset ${currentPresetIndex} guardado con éxito en el servidor!`);
            } catch (err) {
                console.error("Error al guardar presets:", err);
                alert("Hubo un percance de red al intentar salvar el Preset.");
            }
        };
    </script>
</body>
</html>
