<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frontera | Lobby Principal</title>
    <style>
        /* --- RESET Y FUENTE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: 'Arial', sans-serif; }
        body { background-color: #070709; color: #ffffff; height: 100vh; overflow: hidden; position: relative; }

        /* --- UTILIDADES DE CAJAS OSCURAS --- */
        .dark-box { background: rgba(20, 20, 25, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; }

        /* --- ARRIBA IZQUIERDA: PERFIL --- */
        .profile-container {
            position: absolute; top: 20px; left: 20px;
            display: flex; align-items: center; padding: 5px 15px 5px 5px; gap: 10px;
        }
        .level-box {
            background-color: #00ffaa; color: #000; font-size: 20px; font-weight: 900;
            width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; border-radius: 4px;
        }
        .profile-info { display: flex; flex-direction: column; }
        .profile-name { font-size: 18px; font-weight: 900; text-transform: uppercase; }
        .profile-id { font-size: 11px; color: #00ffaa; font-weight: bold; letter-spacing: 1px; }

        /* --- ARRIBA DERECHA: MONEDAS --- */
        .currency-container { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .currency-pill {
            display: flex; align-items: center; padding: 5px 15px; border-radius: 20px; gap: 8px;
            font-size: 14px; font-weight: 900; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
        }
        .text-gold { color: #ffdd00; }
        .text-diamond { color: #00ddff; }

        /* --- MENÚ LATERAL IZQUIERDO --- */
        .left-menu {
            position: absolute; top: 50%; left: 20px; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px;
        }
        .side-btn {
            display: flex; align-items: center; padding: 12px 20px; gap: 10px; width: 180px;
            font-size: 14px; font-weight: 900; color: #fff; cursor: pointer; text-transform: uppercase;
        }
        .side-btn:hover { background: rgba(255,255,255,0.1); }

        /* --- ABAJO IZQUIERDA: INVENTARIO --- */
        .bottom-left-menu {
            position: absolute; bottom: 20px; left: 20px;
            display: flex; gap: 20px; padding: 15px 30px;
        }
        .bottom-btn {
            display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 900; color: #bbb; cursor: pointer;
        }
        .bottom-btn:hover { color: #fff; }

        /* --- ABAJO DERECHA: START --- */
        .start-container {
            position: absolute; bottom: 20px; right: 20px;
            display: flex; flex-direction: column; align-items: flex-end; gap: 10px; width: 280px;
        }
        .mode-selector {
            width: 100%; padding: 15px; text-align: right; cursor: pointer;
        }
        .mode-title { font-size: 16px; font-weight: 900; text-transform: uppercase; margin-bottom: 2px; }
        .mode-map { font-size: 11px; color: #00ffaa; font-weight: bold; }

        .btn-start {
            width: 100%; background: linear-gradient(180deg, #ffcc00 0%, #ff8800 100%);
            color: #000; font-size: 26px; font-weight: 900; font-style: italic;
            border: none; border-radius: 8px; padding: 15px 0; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 4px 15px rgba(255, 136, 0, 0.3);
            transition: transform 0.1s;
        }
        .btn-start:active { transform: scale(0.95); }
        .btn-start:disabled { filter: grayscale(1); cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

    <!-- PERFIL DINÁMICO -->
    <div class="profile-container dark-box">
        <div class="level-box">1</div>
        <div class="profile-info">
            <span class="profile-name" id="user-name">CARGANDO...</span>
            <span class="profile-id" id="user-id">ID: ------</span>
        </div>
    </div>

    <!-- MONEDAS -->
    <div class="currency-container">
        <div class="currency-pill">
            <span>🪙</span> <span class="text-gold" id="user-coins">0</span>
        </div>
        <div class="currency-pill">
            <span>💎</span> <span class="text-diamond">0</span>
        </div>
    </div>

    <!-- MENÚ LATERAL -->
    <div class="left-menu">
        <div class="side-btn dark-box"><span>🛒</span> TIENDA</div>
        <div class="side-btn dark-box"><span>🎯</span> LUCK ROYALE</div>
        <div class="side-btn dark-box"><span>🎫</span> PASE BOOYAH</div>
        <div class="side-btn dark-box"><span>📬</span> MISIONES</div>
    </div>

    <!-- MENÚ INFERIOR IZQUIERDO -->
    <div class="bottom-left-menu dark-box">
        <div class="bottom-btn"><span>📦</span> VAULT</div>
        <div class="bottom-btn"><span>🔫</span> WEAPON</div>
        <div class="bottom-btn"><span>🛠️</span> PRESET</div>
    </div>

    <!-- ZONA DE START -->
    <div class="start-container">
        <div class="mode-selector dark-box">
            <div class="mode-title">CLASIFICATORIA BOT</div>
            <div class="mode-map">MAPA: BERMUDAS</div>
        </div>
        <button id="btn-start" class="btn-start">START</button>
    </div>

    <!-- FIREBASE Y LÓGICA DEL JUEGO -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        // ⚠️ IMPORTANTE: REEMPLAZA ESTO CON LOS DATOS REALES QUE TIENES EN TU INDEX.HTML PRINCIPAL ⚠️
        const firebaseConfig = {
        apiKey: "AIzaSyDeUPVDX40AFX-W_crtUWm0TsXS2smx1zo",
        authDomain: "frontera-game.firebaseapp.com",
        projectId: "frontera-game",
        storageBucket: "frontera-game.firebasestorage.app",
        messagingSenderId: "728596699203",
        appId: "1:728596699203:web:a199829078de6a2ef95cf6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const displayName = user.displayName || user.email.split('@')[0];
                document.getElementById('user-name').innerText = displayName;

                let numericId = user.uid.replace(/\D/g, '').substring(0, 8);
                if (numericId.length < 5) {
                    numericId = Math.floor(Math.random() * 90000000) + 10000000;
                }
                document.getElementById('user-id').innerText = `ID: ${numericId}`;

            } else {
                // Si no hay usuario o las credenciales de arriba fallan, expulsa a la raíz de forma segura.
                window.location.replace("/"); 
            }
        });

        const btnStart = document.getElementById("btn-start");

        btnStart.addEventListener("click", () => {
            let timer = 10;
            btnStart.disabled = true;
            
            const countdown = setInterval(() => {
                btnStart.innerText = `(${timer}S)`;
                timer--;

                if (timer < 0) {
                    clearInterval(countdown);
                    btnStart.innerText = "CARGANDO...";
                    window.location.href = "match.html?id=10960960";
                }
            }, 1000);
        });
    </script>
</body>
</html>
