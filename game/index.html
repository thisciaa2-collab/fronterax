<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frontera-X | Sala Principal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700;900&family=JetBrains+Mono:wght=700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-glass: rgba(10, 14, 26, 0.65);
            --border-glass: rgba(255, 255, 255, 0.12);
            --accent: #00ffcc;
            --accent-yellow: #ffcc00;
            --text-light: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body { 
            margin: 0; overflow: hidden; background-color: #06080c; 
            font-family: 'Inter', sans-serif; width: 100vw; height: 100vh;
        }

        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; display: flex;
            flex-direction: column; justify-content: space-between; padding: 20px;
        }
        .interactive { pointer-events: auto; }

        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; }

        .user-profile {
            background: var(--bg-glass); border: 1px solid var(--border-glass);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 10px 20px; border-radius: 12px; display: flex; align-items: center; gap: 14px;
        }

        .avatar-box {
            width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent) 0%, #006655 100%);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 20px; color: #000;
        }

        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 15px; font-weight: 700; color: var(--text-light); }
        .user-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); margin-top: 2px; }

        .resources { display: flex; gap: 12px; }
        .resource-item {
            background: var(--bg-glass); border: 1px solid var(--border-glass); backdrop-filter: blur(16px);
            padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; color: #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .resource-item.gold span { color: var(--accent-yellow); }
        .resource-item.diamonds span { color: #00bfff; }

        .main-body { display: flex; justify-content: space-between; align-items: center; flex-grow: 1; width: 100%; }
        .side-menu { display: flex; flex-direction: column; gap: 10px; }

        .side-btn {
            background: var(--bg-glass); border: 1px solid var(--border-glass); backdrop-filter: blur(10px);
            color: #cbd5e1; padding: 14px 24px; border-radius: 10px; font-size: 13px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; min-width: 180px; text-align: left;
            transition: all 0.2s ease;
        }
        .side-btn:hover { color: #fff; border-color: var(--accent); transform: translateX(6px); background: rgba(0, 255, 204, 0.15); }

        .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }

        .bottom-nav {
            display: flex; gap: 10px; background: rgba(5, 7, 12, 0.6);
            padding: 6px; border-radius: 12px; border: 1px solid var(--border-glass); backdrop-filter: blur(10px);
        }
        .nav-item { padding: 10px 20px; color: #94a3b8; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .nav-item:hover { color: var(--accent); }

        .start-panel { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
        .mode-selector {
            background: var(--bg-glass); border: 1px solid var(--border-glass); backdrop-filter: blur(12px);
            padding: 12px 24px; border-radius: 12px; text-align: right; min-width: 220px; cursor: pointer;
        }
        .mode-title { font-size: 14px; font-weight: 800; color: #fff; text-transform: uppercase; }
        .map-sub { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; }

        .start-btn {
            background: linear-gradient(135deg, #ffcc00 0%, #ff9900 100%); border: none; color: #000;
            padding: 18px 60px; border-radius: 12px; font-size: 22px; font-weight: 900; cursor: pointer;
            box-shadow: 0 6px 25px rgba(255, 153, 0, 0.4); text-transform: uppercase;
        }

        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #06080c;
            z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 14px; gap: 10px;
        }
        .progress-bar-container { width: 250px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .progress-bar-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s ease; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <span id="loading-msg">SINCROZANIZANDO MUNDO 3D...</span>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="load-progress"></div>
        </div>
    </div>
    
    <div id="game-canvas"></div>

    <div class="hud-overlay">
        <div class="top-bar">
            <div class="user-profile interactive">
                <div class="avatar-box" id="avatar-letter">-</div>
                <div class="user-info">
                    <span class="user-name" id="profile-name">Cargando...</span>
                    <span class="user-id" id="profile-id">ID: ---------</span>
                </div>
            </div>
            <div class="resources interactive">
                <div class="resource-item gold">🪙 <span id="val-gold">0</span></div>
                <div class="resource-item diamonds">💎 <span id="val-diamonds">0</span></div>
            </div>
        </div>

        <div class="main-body">
            <div class="side-menu interactive">
                <button class="side-btn" onclick="window.location.href='store.html'">🛒 Tienda</button>
                <button class="side-btn">🎯 Luck Royale</button>
                <button class="side-btn">🎫 Pase Booyah</button>
                <button class="side-btn">📋 Misiones</button>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="bottom-nav interactive">
                <div class="nav-item">📦 Vault</div>
                <div class="nav-item">🔫 Weapon</div>
            </div>
            <div class="start-panel interactive">
                <div class="mode-selector">
                    <div class="mode-title">Clasificatoria Bot</div>
                    <div class="map-sub">Mapa: Bermudas</div>
                </div>
                <button class="start-btn">START</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeUPVDX40AFX-W_crtUWm0TsXS2smx1zo",
            authDomain: "frontera-game.firebaseapp.com",
            projectId: "frontera-game",
            storageBucket: "frontera-game.firebasestorage.app",
            messagingSenderId: "728596699203",
            appId: "1:728596699203:web:a199829078de6a2ef95cf6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace("../index.html");
            } else {
                const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    document.getElementById("profile-name").textContent = d.username;
                    document.getElementById("profile-id").textContent = "ID: " + d.gameId;
                    document.getElementById("avatar-letter").textContent = d.username.charAt(0).toUpperCase();
                    document.getElementById("val-gold").textContent = Number(d.oro).toLocaleString();
                    document.getElementById("val-diamonds").textContent = d.diamantes;
                    
                    loadCharacterModel();
                }
            }
        });

        // --- ENTORNO THREE.JS ---
        const scene = new THREE.Scene();
        scene.add(new THREE.AmbientLight(0xffffff, 0.85));
        const light = new THREE.DirectionalLight(0xffffff, 0.9);
        light.position.set(4, 10, 6);
        scene.add(light);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.4, 3.0);
        camera.lookAt(0, 1.0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('game-canvas').appendChild(renderer.domElement);

        // Variables globales para controlar el tiempo y las animaciones
        let mixer = null;
        const clock = new THREE.Clock();

        function loadCharacterModel() {
            const loader = new THREE.GLTFLoader();
            const urlFinal = "https://dl.dropboxusercontent.com/scl/fi/l1mn0t9arcqsa5cs7d2gq/Ch06_nonPBR.glb?rlkey=bn8cubv67qyt7xvtej02733qc&st=u1r9ro4p";

            loader.load(urlFinal, (gltf) => {
                const character = gltf.scene;
                
                character.traverse((child) => {
                    if (child.isMesh && child.material) {
                        const materials = Array.isArray(child.material) ? child.material : [child.material];
                        materials.forEach((mat) => {
                            if (mat.map) mat.map.minFilter = THREE.LinearFilter;
                            if (mat.normalMap) mat.normalMap.minFilter = THREE.LinearFilter;
                        });
                    }
                });

                character.position.set(0, 0, 0);
                character.scale.set(1.1, 1.1, 1.1);
                scene.add(character);

                // 🎬 LÓGICA DE ANIMACIÓN INYECTADA:
                // Si el archivo contiene animaciones internas, tomamos la primera (índice 0, típicamente la pose por defecto o idle)
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(character);
                    const action = mixer.clipAction(gltf.animations[0]);
                    action.play();
                } else {
                    console.warn("Este modelo no incluye pistas de animación integradas en el archivo.");
                }
                
                document.getElementById("loading-screen").style.display = "none";
                
                function rotateModel() {
                    requestAnimationFrame(rotateModel);
                    character.rotation.y += 0.004;
                }
                rotateModel();

            }, (xhr) => {
                if (xhr.total > 0) {
                    const percent = (xhr.loaded / xhr.total) * 100;
                    document.getElementById("load-progress").style.width = percent + "%";
                }
            }, (err) => {
                console.error("Error cargando desde el CDN directo:", err);
                document.getElementById("loading-screen").style.display = "none";
            });
        }

        // Bucle de renderizado actualizado para refrescar los fotogramas de la animación en tiempo real
        function renderLoop() {
            requestAnimationFrame(renderLoop);
            
            // Si el reproductor de animaciones está activo, actualiza el esqueleto basándose en el reloj interno
            if (mixer) {
                const delta = clock.getDelta();
                mixer.update(delta);
            }

            renderer.setClearColor(0x070a14);
            renderer.render(scene, camera);
        }
        renderLoop();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
