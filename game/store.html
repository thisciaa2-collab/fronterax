<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frontera-X | Tienda Oficial</title>
    <!-- Favicon saliendo a la raíz -->
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    
    <style>
        :root {
            --bg-dark: #06080c;
            --bg-glass: rgba(10, 14, 26, 0.75);
            --border-glass: rgba(255, 255, 255, 0.12);
            --accent: #00ffcc;
            --accent-purple: #9d4edd;
            --accent-yellow: #ffcc00;
            --text-light: #ffffff;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: var(--bg-dark); font-family: 'Inter', sans-serif; color: var(--text-light); min-height: 100vh; }
        .top-navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(5, 7, 12, 0.8); border-bottom: 1px solid var(--border-glass); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
        .back-btn { background: var(--bg-glass); border: 1px solid var(--border-glass); color: var(--text-light); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .store-title { font-size: 24px; font-weight: 900; text-transform: uppercase; }
        .store-title span { color: var(--accent); }
        .nav-right { display: flex; gap: 14px; }
        .currency-box { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-glass); padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .currency-box.gold span { color: var(--accent-yellow); }
        .currency-box.diamonds span { color: #00bfff; }
        .main-container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .category-tabs { display: flex; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 15px; margin-bottom: 30px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 14px; font-weight: 800; text-transform: uppercase; padding: 10px 20px; cursor: pointer; position: relative; }
        .tab-btn.active { color: var(--accent); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -16px; left: 0; width: 100%; height: 2px; background: var(--accent); }
        .category-section { display: none; }
        .category-section.active { display: block; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .character-card { background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
        .character-display { width: 100%; height: 180px; background: #121824; display: flex; align-items: center; justify-content: center; }
        .character-avatar-placeholder { font-size: 32px; font-weight: 900; opacity: 0.2; }
        .character-details { padding: 20px; display: flex; flex-direction: column; gap: 12px; flex-grow: 1; }
        .character-name { font-size: 22px; font-weight: 900; text-transform: uppercase; }
        .character-ability { font-size: 13px; color: var(--text-muted); min-height: 50px; }
        .price-row { display: flex; align-items: center; gap: 16px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px; }
        .price-item { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .price-item.gold { color: var(--accent-yellow); }
        .price-item.diamonds { color: #00bfff; }
        .card-actions { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 10px; margin-top: 12px; }
        .btn-buy { background: #fff; border: none; color: #000; padding: 12px; border-radius: 8px; font-size: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .btn-gift { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-glass); color: var(--text-light); padding: 12px; border-radius: 8px; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .modal-payment { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .payment-card { background: #0d111a; border: 1px solid var(--border-glass); width: 400px; border-radius: 16px; padding: 30px; text-align: center; }
        .payment-title { font-size: 18px; font-weight: 900; text-transform: uppercase; margin-bottom: 12px; }
        .payment-options { display: flex; flex-direction: column; gap: 12px; }
        .pay-option-btn { background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass); padding: 16px; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .close-payment { margin-top: 20px; font-size: 12px; color: var(--text-muted); cursor: pointer; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="top-navbar">
        <div class="nav-left">
            <!-- Retorno apuntando a index.html dentro de game/ -->
            <button class="back-btn" onclick="window.location.href='index.html'">⬅ Volver</button>
        </div>
        <h1 class="store-title">ARMERÍA // <span>TIENDA</span></h1>
        <div class="nav-right">
            <div class="currency-box gold">🪙 <span id="store-gold">0</span></div>
            <div class="currency-box diamonds">💎 <span id="store-diamonds">0</span></div>
        </div>
    </header>

    <main class="main-container">
        <div class="category-tabs">
            <button class="tab-btn active" onclick="switchCategory('usable', this)">Usables</button>
            <button class="tab-btn" onclick="switchCategory('ayudable', this)">Ayudables</button>
        </div>

        <section id="cat-usable" class="category-section active">
            <div class="products-grid">
                <div class="character-card">
                    <div class="character-display"><div class="character-avatar-placeholder">TAMAKI</div></div>
                    <div class="character-details">
                        <h3 class="character-name">Tamaki</h3>
                        <p class="character-ability">Da velocidad y daño crítico temporal en combate.</p>
                        <div class="price-row">
                            <div class="price-item gold">🪙 10,000</div>
                            <div class="price-item diamonds">💎 300</div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-buy" id="btn-buy-Tamaki" onclick="openPaymentFlow('Tamaki', 10000, 300)">Obtener</button>
                            <button class="btn-gift" onclick="giftCharacter('Tamaki', 10000, 300)">Regalar</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="cat-ayudable" class="category-section">
            <div class="products-grid">
                <div class="character-card">
                    <div class="character-display"><div class="character-avatar-placeholder">TIVET</div></div>
                    <div class="character-details">
                        <h3 class="character-name">Tivet</h3>
                        <p class="character-ability">Otorga velocidad y curación con escudo automático.</p>
                        <div class="price-row">
                            <div class="price-item gold">🪙 5,000</div>
                            <div class="price-item diamonds">💎 200</div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-buy" id="btn-buy-Tivet" onclick="openPaymentFlow('Tivet', 5000, 200)">Obtener</button>
                            <button class="btn-gift" onclick="giftCharacter('Tivet', 5000, 200)">Regalar</button>
                        </div>
                    </div>
                </div>
                <div class="character-card">
                    <div class="character-display"><div class="character-avatar-placeholder">GALLET</div></div>
                    <div class="character-details">
                        <h3 class="character-name">Gallet</h3>
                        <p class="character-ability">Maximiza los puntos de escudo del jugador.</p>
                        <div class="price-row">
                            <div class="price-item gold">🪙 5,000</div>
                            <div class="price-item diamonds">💎 200</div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-buy" id="btn-buy-Gallet" onclick="openPaymentFlow('Gallet', 5000, 200)">Obtener</button>
                            <button class="btn-gift" onclick="giftCharacter('Gallet', 5000, 200)">Regalar</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal-payment" id="paymentModal">
        <div class="payment-card">
            <div class="payment-title" id="pay-title">Método de Pago</div>
            <div class="payment-options">
                <button class="pay-option-btn" id="pay-gold-btn"><span>🪙 Monedas</span><span id="pay-gold-cost">0</span></button>
                <button class="pay-option-btn" id="pay-diamonds-btn" style="color:#00bfff;"><span>💎 Diamantes</span><span id="pay-diamonds-cost">0</span></button>
            </div>
            <div class="close-payment" onclick="closePaymentFlow()">Cancelar</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeUPVDX40AFX-W_crtUWm0TsXS2smx1zo",
            authDomain: "frontera-game.firebaseapp.com",
            projectId: "frontera-game",
            storageBucket: "frontera-game.firebasestorage.app",
            messagingSenderId: "728596699203",
            appId: "1:728596699203:web:a199829078de6a2ef95cf6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUserDocRef = null;
        let saldoOro = 0, saldoDiamantes = 0, miNombre = "", misPersonajes = [];
        let currentTargetItem = { nombre: "", oro: 0, diamantes: 0 };

        onAuthStateChanged(auth, async (user) => {
            if (!user) window.location.replace("../index.html");
            else {
                currentUserDocRef = doc(db, "usuarios", user.uid);
                await actualizarDatosUsuario();
            }
        });

        async function actualizarDatosUsuario() {
            if (!currentUserDocRef) return;
            const docSnap = await getDoc(currentUserDocRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                saldoOro = data.oro || 0;
                saldoDiamantes = data.diamantes || 0;
                miNombre = data.username || "Alguien";
                misPersonajes = data.personajes || [];
                
                document.getElementById("store-gold").textContent = Number(saldoOro).toLocaleString();
                document.getElementById("store-diamonds").textContent = saldoDiamantes;

                verifyOwnedCharacters();
            }
        }

        function verifyOwnedCharacters() {
            ["Tamaki", "Tivet", "Gallet"].forEach(pj => {
                const btn = document.getElementById(`btn-buy-${pj}`);
                if (btn) {
                    if (misPersonajes.includes(pj)) {
                        btn.textContent = "Ya lo tienes";
                        btn.disabled = true;
                        btn.style.background = "#1e293b";
                        btn.style.color = "#64748b";
                    } else {
                        btn.textContent = "Obtener";
                        btn.disabled = false;
                        btn.style.background = "#fff";
                        btn.style.color = "#000";
                    }
                }
            });
        }

        window.switchCategory = function(categoria, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.category-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`cat-${categoria}`).classList.add('active');
        };

        window.openPaymentFlow = function(nombre, costoOro, costoDiamantes) {
            if (misPersonajes.includes(nombre)) return;
            currentTargetItem = { nombre, oro: costoOro, diamantes: costoDiamantes };
            document.getElementById("pay-title").textContent = `Desbloquear ${nombre}`;
            document.getElementById("pay-gold-cost").textContent = costoOro.toLocaleString();
            document.getElementById("pay-diamonds-cost").textContent = costoDiamantes;
            document.getElementById("pay-gold-btn").onclick = () => executePurchase('oro');
            document.getElementById("pay-diamonds-btn").onclick = () => executePurchase('diamantes');
            document.getElementById("paymentModal").style.display = "flex";
        };

        window.closePaymentFlow = () => { document.getElementById("paymentModal").style.display = "none"; };

        async function executePurchase(metodo) {
            closePaymentFlow();
            const { nombre, oro, diamantes } = currentTargetItem;
            if (metodo === 'oro') {
                if (saldoOro < oro) return alert("Monedas insuficientes.");
                saldoOro -= oro;
                await updateDoc(currentUserDocRef, { oro: saldoOro, personajes: arrayUnion(nombre) });
            } else {
                if (saldoDiamantes < diamantes) return alert("Diamantes insuficientes.");
                saldoDiamantes -= diamantes;
                await updateDoc(currentUserDocRef, { diamantes: saldoDiamantes, personajes: arrayUnion(nombre) });
            }
            alert(`¡${nombre} desbloqueado!`);
            await actualizarDatosUsuario();
        }

        window.giftCharacter = async function(nombre, costoOro, costoDiamantes) {
            const targetId = prompt("Introduce el ID del jugador:");
            if (!targetId) return;
            const q = query(collection(db, "usuarios"), where("gameId", "==", targetId.trim()));
            const snap = await getDocs(q);
            if (snap.empty) return alert("ID no encontrado.");
            const amigoDoc = snap.docs[0];
            const divisa = prompt(`Pagar con:\n1. Monedas\n2. Diamantes`);
            
            let costo = divisa === "1" ? costoOro : costoDiamantes;
            if (divisa === "1" && saldoOro < costo) return alert("Saldo insuficiente.");
            if (divisa === "2" && saldoDiamantes < costo) return alert("Saldo insuficiente.");

            if (divisa === "1") { saldoOro -= costoOro; await updateDoc(currentUserDocRef, { oro: saldoOro }); }
            else { saldoDiamantes -= costoDiamantes; await updateDoc(currentUserDocRef, { diamantes: saldoDiamantes }); }

            await addDoc(collection(db, "usuarios", amigoDoc.id, "buzon"), {
                remitenteNombre: miNombre, tipo: "personaje", item: nombre, mensaje: "¡Un regalo para ti!", fecha: new Date().toISOString(), reclamado: false
            });
            alert("¡Regalo enviado!");
            await actualizarDatosUsuario();
        };
    </script>
</body>
</html>
