<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRONTERA GAME — Acceso Oficial</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.4);
            --accent-dark: #00b38f;
            --bg-glass: rgba(5, 10, 25, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
        }

        body {
            background-color: #020408;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- FONDO ANIMADO DE ALTA GAMA --- */
        .animated-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #061026 0%, #02050d 100%);
        }

        /* Rejilla de perspectiva en movimiento */
        .bg-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridScroll 14s linear infinite;
        }

        /* Nebulosas flotantes */
        .nebula-1 {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.08) 0%, transparent 70%);
            top: -200px;
            left: -100px;
            animation: floatOrb 18s ease-in-out infinite alternate;
        }

        .nebula-2 {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.06) 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            animation: floatOrb 22s ease-in-out infinite alternate-reverse;
        }

        @keyframes gridScroll {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.15); }
        }

        /* --- ESTRUCTURA EXPANDIDA E INTERFAZ --- */
        .main-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 580px;
            padding: 24px;
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TÍTULO AAA GIGANTE */
        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 35px;
            line-height: 1.1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1),
                         0 0 50px var(--accent-glow);
        }

        .game-title span {
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
        }

        /* PANEL CENTRAL PROFESIONAL */
        .auth-panel {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            padding: 50px 45px;
            border-radius: 24px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5),
                        inset 0 1px 1px rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
        }

        .auth-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        /* SECCIÓN SUPERIOR: BADGE DE ESTADO DEL SERVIDOR */
        .badge-container {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            background: rgba(0, 255, 204, 0.04);
            border: 1px solid rgba(0, 255, 204, 0.12);
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            color: #e2e8f0;
            margin-bottom: 35px;
            text-align: left;
        }

        .badge-container svg {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            fill: var(--accent);
            filter: drop-shadow(0 0 4px var(--accent-glow));
        }

        /* SECCIÓN INTERMEDIA: CALL TO ACTION */
        .cta-container {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 25px;
            text-align: left;
            border-left: 3px solid var(--accent);
            padding-left: 14px;
        }

        .cta-container svg {
            width: 22px;
            height: 22px;
            fill: #a0aec0;
        }

        /* --- BOTÓN DE GOOGLE MEJORADO Y FUNCIONAL --- */
        .btn-google-auth {
            background: #ffffff;
            color: #020408;
            border: none;
            padding: 18px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-google-auth:hover {
            background: var(--accent);
            color: #000000;
            transform: translateY(-3px);
            box-shadow: 0 12px 28px var(--accent-glow);
        }

        .btn-google-auth:active {
            transform: translateY(-1px);
        }

        .google-icon-svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .btn-google-auth:hover .google-icon-svg {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="animated-bg">
        <div class="bg-grid"></div>
        <div class="nebula-1"></div>
        <div class="nebula-2"></div>
    </div>

    <main class="main-container">
        
        <h1 class="game-title">FRONTERA <span>GAME</span></h1>

        <div class="auth-panel">
            
            <div class="badge-container">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2A5 5 0 0 0 7 7v4H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5zm0 2a3 3 0 0 1 3 3v4H9V7a3 3 0 0 1 3-3zm0 11a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/>
                </svg>
                <p>Un servidor beta, de nuestro juego. Nuestro juego estilo Battle Royale.</p>
            </div>

            <div class="cta-container">
                <svg viewBox="0 0 24 24">
                    <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 3c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm3-3c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                </svg>
                <p>Juega ya nuestro juego. Es hora de registrarse con Google.</p>
            </div>

            <button class="btn-google-auth" id="btn-login">
                <svg class="google-icon-svg" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 20.26 2.09 22.56 3.66l-2.77 3.57c-1.37-.93-3.16-1.12-4.75-.48-1.58.64-2.75 2.03-3.05 3.73h2.18z"/>
                </svg>
                <span class="btn-text">Entrar con Google</span>
            </button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeUPVDX40AFX-W_crtUWm0TsXS2smx1zo",
            authDomain: "frontera-game.firebaseapp.com",
            projectId: "frontera-game",
            storageBucket: "frontera-game.firebasestorage.app",
            messagingSenderId: "728596699203",
            appId: "1:728596699203:web:a199829078de6a2ef95cf6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // AQUÍ SE CORRIGE EL ERROR: Escuchamos el clic desde JavaScript, no desde el HTML
        document.getElementById("btn-login").addEventListener("click", () => {
            signInWithPopup(auth, provider).catch(err => {
                console.error("Error al iniciar sesión:", err);
            });
        });

        // Verificador de estado de sesión
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);

                // Si ya existe en base de datos, pa' dentro
                if (docSnap.exists()) {
                    window.location.href = "game/index.html";
                } else {
                    // Si es nuevo, pedimos datos y registramos
                    await registrarNuevoUsuarioEnFirestore(user);
                }
            }
        });

        async function registrarNuevoUsuarioEnFirestore(user) {
            let username = prompt("Introduce tu nombre de usuario de Frontera:");
            if (!username || username.trim() === "") username = "Recluta X";

            let genero = "";
            while (genero !== "hombre" && genero !== "mujer") {
                let seleccion = prompt("Selecciona el género de tu personaje:\n\nEscribe '1' para HOMBRE\nEscribe '2' para MUJER");
                if (seleccion === "1") genero = "hombre";
                if (seleccion === "2") genero = "mujer";
            }

            let region = prompt("Introduce tu región (Ej: EE.UU. / LATAM / EUROPA):");
            if (!region || region.trim() === "") region = "Global";

            const gameId = Math.floor(100000000 + Math.random() * 900000000).toString();

            const nuevoUsuario = {
                uid: user.uid,
                username: username.trim(),
                gameId: gameId,
                genero: genero, 
                region: region.trim(),
                oro: 5000, 
                diamantes: 10,
                nivel: 1,
                personajes: ["Tamaki"], 
                presets: {
                    preset1: { usable: "Tamaki", ayudables: ["", "", ""] },
                    preset2: { usable: "", ayudables: ["", "", ""] },
                    preset3: { usable: "", ayudables: ["", "", ""] },
                    preset4: { usable: "", ayudables: ["", "", ""] },
                    preset5: { usable: "", ayudables: ["", "", ""] }
                },
                fechaRegistro: new Date().toISOString()
            };

            await setDoc(doc(db, "usuarios", user.uid), nuevoUsuario);
            window.location.href = "game/index.html";
        }
    </script>
</body>
</html>
