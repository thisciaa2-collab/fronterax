<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontera-X | Acceso</title>
    <!-- Favicon directo en la raíz -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #06080c;
            font-family: 'Inter', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .auth-card {
            background: rgba(10, 14, 26, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 40px;
            border-radius: 16px;
            width: 380px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h2 { font-size: 24px; font-weight: 900; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }
        h2 span { color: #00ffcc; }
        .btn-google {
            background: #fff; color: #000; border: none; padding: 14px 20px;
            border-radius: 8px; font-size: 14px; font-weight: 800; text-transform: uppercase;
            cursor: pointer; width: 100%; transition: all 0.2s ease;
        }
        .btn-google:hover { background: #00ffcc; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Frontera-X // <span>Acceso</span></h2>
        <button class="btn-google" id="btn-login">Entrar con Google</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeUPVDX40AFX-W_crtUWm0TsXS2smx1zo",
            authDomain: "frontera-game.firebaseapp.com",
            projectId: "frontera-game",
            storageBucket: "frontera-game.firebasestorage.app",
            messagingSenderId: "728596699203",
            appId: "1:728596699203:web:a199829078de6a2ef95cf6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        document.getElementById("btn-login").onclick = () => {
            signInWithPopup(auth, provider).catch(err => console.error("Error login:", err));
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    window.location.href = "game/index.html";
                } else {
                    await registrarNuevoUsuarioEnFirestore(user);
                }
            }
        });

        async function registrarNuevoUsuarioEnFirestore(user) {
            let username = prompt("Introduce tu nombre de usuario:");
            if (!username || username.trim() === "") username = "Recluta X";

            let genero = "";
            while (genero !== "hombre" && genero !== "mujer") {
                let seleccion = prompt("Selecciona el género de tu personaje:\n\nEscribe '1' para HOMBRE\nEscribe '2' para MUJER");
                if (seleccion === "1") genero = "hombre";
                if (seleccion === "2") genero = "mujer";
            }

            let region = prompt("Introduce tu región (Ej: EE.UU. / LATAM / EUROPA):");
            if (!region || region.trim() === "") region = "Global";

            const gameId = Math.floor(100000000 + Math.random() * 900000000).toString();

            const nuevoUsuario = {
                uid: user.uid,
                username: username.trim(),
                gameId: gameId,
                genero: genero, 
                region: region.trim(),
                oro: 5000, 
                diamantes: 10,
                nivel: 1,
                personajes: ["Tamaki"], 
                presets: {
                    preset1: { usable: "Tamaki", ayudables: ["", "", ""] },
                    preset2: { usable: "", ayudables: ["", "", ""] },
                    preset3: { usable: "", ayudables: ["", "", ""] },
                    preset4: { usable: "", ayudables: ["", "", ""] },
                    preset5: { usable: "", ayudables: ["", "", ""] }
                },
                fechaRegistro: new Date().toISOString()
            };

            await setDoc(doc(db, "usuarios", user.uid), nuevoUsuario);
            window.location.href = "game/index.html";
        }
    </script>
</body>
</html>
