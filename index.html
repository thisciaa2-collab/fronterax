<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRONTERA GAME — Acceso Oficial</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.4);
            --accent-dark: #00b38f;
            --bg-glass: rgba(5, 10, 25, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
        }

        body {
            background-color: #020408;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- FONDO ANIMADO DE ALTA GAMA --- */
        .animated-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #061026 0%, #02050d 100%);
        }

        /* Rejilla de perspectiva en movimiento */
        .bg-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridScroll 14s linear infinite;
        }

        /* Nebulosas flotantes */
        .nebula-1 {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.08) 0%, transparent 70%);
            top: -200px;
            left: -100px;
            animation: floatOrb 18s ease-in-out infinite alternate;
        }

        .nebula-2 {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.06) 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            animation: floatOrb 22s ease-in-out infinite alternate-reverse;
        }

        @keyframes gridScroll {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.15); }
        }

        /* --- ESTRUCTURA EXPANDIDA E INTERFAZ (MÁS GRANDE) --- */
        .main-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 580px; /* Incrementado para dar más presencia */
            padding: 24px;
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TÍTULO AAA GIGANTE */
        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 56px; /* Más grande e imponente */
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 35px;
            line-height: 1.1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1),
                         0 0 50px var(--accent-glow);
        }

        .game-title span {
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
        }

        /* PANEL CENTRAL PROFESIONAL */
        .auth-panel {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            padding: 50px 45px; /* Más espacio interno */
            border-radius: 24px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5),
                        inset 0 1px 1px rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
        }

        /* Línea superior estética decorativa de interfaces gaming */
        .auth-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        /* SECCIÓN SUPERIOR: BADGE DE ESTADO DEL SERVIDOR */
        .badge-container {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            background: rgba(0, 255, 204, 0.04);
            border: 1px solid rgba(0, 255, 204, 0.12);
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            color: #e2e8f0;
            margin-bottom: 35px;
            text-align: left;
        }

        .badge-container svg {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            fill: var(--accent);
            filter: drop-shadow(0 0 4px var(--accent-glow));
        }

        /* SECCIÓN INTERMEDIA: CALL TO ACTION */
        .cta-container {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 25px;
            text-align: left;
            border-left: 3px solid var(--accent);
            padding-left: 14px;
        }

        .cta-container svg {
            width: 22px;
            height: 22px;
            fill: #a0aec0;
        }

        /* --- BOTÓN DE GOOGLE MEJORADO Y FUNCIONAL --- */
        .btn-google-auth {
            background: #ffffff;
            color: #020408;
            border: none;
            padding: 18px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-google-auth:hover {
            background: var(--accent);
            color: #000000;
            transform: translateY(-3px);
            box-shadow: 0 12px 28px var(--accent-glow);
        }

        .btn-google-auth:active {
            transform: translateY(-1px);
        }

        .google-icon-svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .btn-google-auth:hover .google-icon-svg {
            transform: scale(1.1);
        }

        /* EFECTO DE CARGA (SPINNER) AL HACER CLICK */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #000000;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Estado deshabilitado durante la carga simulada */
        .btn-google-auth.loading {
            background: var(--accent-dark) !important;
            color: #000000 !important;
            cursor: not-allowed;
            transform: translateY(0);
            box-shadow: none;
        }

        .btn-google-auth.loading .google-icon-svg,
        .btn-google-auth.loading .btn-text {
            display: none;
        }

        .btn-google-auth.loading .spinner {
            display: block;
        }

        /* ELEMENTOS PIE DE PÁGINA */
        .footer-terms {
            margin-top: 30px;
            font-size: 12px;
            color: #4a5568;
            letter-spacing: 0.5px;
        }
    </style>
</head>
